[package]
name = "tass-lex"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "Generated Rust types for tass lexicons (at.telluri.*). Do not edit — regenerate via `cargo run -p tass-codegen`."

[lib]
name = "tass_lex"
path = "src/lib.rs"

[features]
default = ["at_telluri"]
at_telluri = []

[dependencies]
jacquard-common.workspace = true
jacquard-derive.workspace = true
jacquard-lexicon.workspace = true
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
serde_json = "1"
chrono = "0.4"
jacquard-common.workspace = true
jacquard-lexicon.workspace = true

[[example]]
name = "smoke"
path = "examples/smoke.rs"
